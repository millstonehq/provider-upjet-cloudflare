{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "provider-cloudflare.secretName" . }}
  namespace: {{ .Values.secret.namespace }}
  labels:
    {{- include "provider-cloudflare.labels" . | nindent 4 }}
  annotations:
    {{- include "provider-cloudflare.annotations" (dict "root" . "syncWave" .Values.syncWave.secret) | nindent 4 }}
type: Opaque
{{- if .Values.secret.apiToken }}
data:
  api_token: {{ .Values.secret.apiToken | b64enc | quote }}
{{- end }}
{{- end }}

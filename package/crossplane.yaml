apiVersion: meta.pkg.crossplane.io/v1alpha1
kind: Provider
metadata:
  name: provider-cloudflare
  annotations:
    meta.crossplane.io/maintainer: Millstone Services LLC
    meta.crossplane.io/source: github.com/millstonehq/mill
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane provider for Cloudflare DNS management.
    meta.crossplane.io/readme: |
      # Crossplane Provider Cloudflare

      This provider enables declarative management of Cloudflare resources via Crossplane.

      ## Features
      - DNS record management
      - Zone management

      ## Authentication
      Supports Cloudflare API token authentication.

      ## Installation
      ```yaml
      apiVersion: pkg.crossplane.io/v1
      kind: Provider
      metadata:
        name: provider-cloudflare
      spec:
        package: xpkg.upbound.io/millstonehq/provider-cloudflare:v0.1.0
      ```

      ## Configuration
      ```yaml
      apiVersion: cloudflare.millstone.tech/v1beta1
      kind: ProviderConfig
      metadata:
        name: default
      spec:
        credentials:
          source: Secret
          secretRef:
            name: cloudflare-creds
            namespace: crossplane-system
            key: api_token
      ```

      For more information, visit: https://github.com/millstonehq/mill/tree/main/providers/crossplane-provider-cloudflare
spec:
  crossplane:
    version: ">=v1.14.0-0"
  controller:
    image: ghcr.io/millstonehq/provider-cloudflare:latest
    permissionRequests:
    - apiGroups:
      - cloudflare.millstone.tech
      resources:
      - providerconfigs
      - providerconfigs/status
      verbs:
      - get
      - list
      - watch
      - update
      - patch
    - apiGroups:
      - cloudflare.millstone.tech
      resources:
      - providerconfigusages
      - providerconfigusages/status
      verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
